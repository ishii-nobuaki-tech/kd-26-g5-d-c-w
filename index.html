<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- 検索エンジンにインデックスさせず、リンクも辿らせず、キャッシュも残させない設定 -->
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
  <meta name="googlebot" content="noindex, nofollow">
  <!-- タイトルを空にしてブラウザのタブで目立たなくする -->
  <title></title>
  <style>
    /* 余白をなくし、画面全体に広げる設定 */
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #ffffff;
    }
    /* iframeを画面いっぱいに表示し、枠線を消す */
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
    /* 初期状態は非表示にする */
    #dashboard-container {
      display: none;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div id="dashboard-container">
    <!-- srcのURLを実際のLooker StudioのURLに変更してください -->
    <iframe
      src="https://lookerstudio.google.com/embed/reporting/XXXXXXX"
      allowfullscreen
      frameborder="0"
    ></iframe>
  </div>

  <script>
    // ページがiframe内で読み込まれているかを安全に判定（クロスオリジン制約の回避）
    function isEmbedded() {
      try {
        return window.self !== window.top;
      } catch (e) {
        // セキュリティエラー（クロスオリジンでtopにアクセスできない）が発生した場合、
        // 確実に別のドメイン（SharePointなど）のiframe内にいると判断できる
        return true;
      }
    }

    if (isEmbedded()) {
      // iframe内で読み込まれている場合のみ、ダッシュボードを表示する
      document.getElementById('dashboard-container').style.display = 'block';
    } else {
      // 直接URLを叩いてアクセスされた場合は何もしない（真っ白な画面のまま）
    }
  </script>

  <!--
  ====================================================================
  SharePointの「埋め込み」Webパーツ用 最適化コード
  ====================================================================
  以下のコードをSharePointの「埋め込み」Webパーツに貼り付けてください。
  ※ src="..." の部分は、ご自身のGitHub PagesのURLに変更してください。

  <iframe 
    src="https://<あなたのユーザー名>.github.io/<リポジトリ名>/"
    width="100%" 
    height="800" 
    frameborder="0" 
    scrolling="no" 
    allowfullscreen 
    loading="eager"
  ></iframe>

  【修正のポイント】
  1. sandbox属性の削除
     Looker Studioは複雑なスクリプトや認証、Cookieを使用するため、
     sandbox属性で制限をかけると正常に描画されず真っ白になる原因となります。
  2. クロスオリジン判定の修正
     SharePointとGitHub Pagesでドメインが異なるため、単純な判定では
     セキュリティエラーでスクリプトが停止してしまう問題を修正しました。
  ====================================================================
  -->
</body>
</html>
