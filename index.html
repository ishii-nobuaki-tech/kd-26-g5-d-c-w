<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Looker Studio Dashboard</title>
  <style>
    /* 余白をなくし、画面全体に広げる設定 */
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #ffffff;
    }
    /* iframeを画面いっぱいに表示し、枠線を消す */
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
  </style>
</head>
<body>
  <!-- srcのURLを実際のLooker StudioのURLに変更してください -->
  <iframe
    src="https://lookerstudio.google.com/embed/reporting/XXXXXXX"
    allowfullscreen
    title="Looker Studio Dashboard"
    sandbox="allow-storage-access-by-user-activation allow-scripts allow-same-origin allow-popups allow-popups-to-escape-sandbox"
  ></iframe>
</body>
</html>
