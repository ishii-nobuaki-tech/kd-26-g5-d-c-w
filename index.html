<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- 検索エンジンにインデックスさせず、リンクも辿らせず、キャッシュも残させない設定 -->
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
  <meta name="googlebot" content="noindex, nofollow">
  
  <!-- 
    【重要】SharePoint（Microsoft 365）での埋め込み許可
    Edgeなどのブラウザで「login.microsoftonline.com 接続が拒否されました」という
    エラーが出る場合、サードパーティCookieのブロックや、クロスドメインでの
    認証（Looker StudioのGoogle認証とSharePointのMicrosoft認証の競合）が原因です。
    
    Content-Security-Policy (CSP) を設定し、SharePointのドメインからの
    フレーム埋め込み（frame-ancestors）を明示的に許可します。
  -->
  <meta http-equiv="Content-Security-Policy" content="frame-ancestors 'self' https://*.sharepoint.com https://*.microsoftonline.com;">

  <!-- タイトルを空にしてブラウザのタブで目立たなくする -->
  <title></title>
  <style>
    /* 余白をなくし、画面全体に広げる設定 */
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #ffffff;
    }
    /* iframeを画面いっぱいに表示し、枠線を消す */
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
    /*
      【重要】直接アクセス対策
      初期状態は「表示」にしておき、JavaScriptで「トップウィンドウ」だと
      判定できた場合のみ「非表示（真っ白）」にするという逆のアプローチを取ります。
      
      これにより、SharePointなどのクロスオリジン環境でJSがエラーになっても、
      初期状態の「表示」が維持されるため、真っ白になるのを防げます。
    */
    #dashboard-container {
      width: 100%;
      height: 100%;
      /* 初期状態は「表示」 */
      display: block;
    }
  </style>
</head>
<body>
  <div id="dashboard-container">
    <!-- srcのURLを実際のLooker StudioのURLに変更してください -->
    <iframe
      src="https://lookerstudio.google.com/embed/reporting/XXXXXXX"
      allowfullscreen
      frameborder="0"
    ></iframe>
  </div>

  <script>
    // ページが直接開かれているか（トップウィンドウか）を判定
    try {
      if (window.self === window.top) {
        // 直接URLを叩いてアクセスされた場合は、コンテナを非表示（真っ白）にする
        document.getElementById('dashboard-container').style.display = 'none';
        
        // 完全に消し去る場合は要素ごと削除
        // document.body.innerHTML = '';
      }
    } catch (e) {
      // セキュリティエラー（クロスオリジンでtopにアクセスできない）が発生した場合、
      // 確実に別のドメイン（SharePointなど）のiframe内にいると判断できるため、
      // 何もしない（初期状態の「表示」のままにする）
    }
  </script>

  <!--
  ====================================================================
  SharePointの「埋め込み」Webパーツ用 最適化コード
  ====================================================================
  以下のコードをSharePointの「埋め込み」Webパーツに貼り付けてください。
  ※ src="..." の部分は、ご自身のGitHub PagesのURLに変更してください。

  <iframe 
    src="https://<あなたのユーザー名>.github.io/<リポジトリ名>/"
    width="100%" 
    height="800" 
    frameborder="0" 
    scrolling="no" 
    allowfullscreen 
    loading="eager"
  ></iframe>
  ====================================================================
  -->
</body>
</html>
